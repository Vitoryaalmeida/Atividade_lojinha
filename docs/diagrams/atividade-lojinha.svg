<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="980" viewBox="0 0 1200 980">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #2d2d2d; }
      .lane-title { font: 700 18px Arial, sans-serif; fill: #ffffff; }
      .text { font: 15px Arial, sans-serif; fill: #2d2d2d; }
      .small { font: 13px Arial, sans-serif; fill: #2d2d2d; }
      .action { fill: #fff8ef; stroke: #d28a3d; stroke-width: 2; rx: 12; ry: 12; }
      .decision { fill: #fff3e1; stroke: #d28a3d; stroke-width: 2; }
      .lane { fill: #f8f8f8; stroke: #d8d8d8; stroke-width: 2; }
      .lane-header { fill: #d28a3d; }
      .flow { stroke: #4a4a4a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .note { fill: #eef5ff; stroke: #6a8fcf; stroke-width: 1.5; rx: 10; ry: 10; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#4a4a4a" />
    </marker>
  </defs>

  <text x="430" y="42" class="title">Diagrama de Atividades - Lojinha Online</text>

  <rect x="40" y="70" width="320" height="860" class="lane"/>
  <rect x="360" y="70" width="470" height="860" class="lane"/>
  <rect x="830" y="70" width="330" height="860" class="lane"/>

  <rect x="40" y="70" width="320" height="50" class="lane-header"/>
  <rect x="360" y="70" width="470" height="50" class="lane-header"/>
  <rect x="830" y="70" width="330" height="50" class="lane-header"/>

  <text x="165" y="102" class="lane-title">Cliente</text>
  <text x="545" y="102" class="lane-title">Servidor Monolítico</text>
  <text x="920" y="102" class="lane-title">Sistema Externo de Pagamento</text>

  <circle cx="200" cy="160" r="18" fill="#2d2d2d"/>
  <rect x="110" y="200" width="180" height="58" class="action"/>
  <text x="145" y="235" class="text">Acessa a lojinha</text>

  <rect x="470" y="200" width="220" height="58" class="action"/>
  <text x="510" y="235" class="text">Identifica cliente</text>

  <rect x="110" y="300" width="180" height="58" class="action"/>
  <text x="125" y="335" class="text">Navega no catálogo</text>

  <rect x="470" y="300" width="220" height="58" class="action"/>
  <text x="485" y="335" class="text">Lista produtos disponíveis</text>

  <rect x="110" y="400" width="180" height="58" class="action"/>
  <text x="120" y="435" class="text">Seleciona produtos</text>

  <rect x="470" y="400" width="220" height="58" class="action"/>
  <text x="495" y="435" class="text">Cria pedido e itens</text>

  <rect x="470" y="500" width="220" height="58" class="action"/>
  <text x="490" y="535" class="text">Calcula valor total</text>

  <rect x="110" y="600" width="180" height="58" class="action"/>
  <text x="145" y="635" class="text">Confirma compra</text>

  <rect x="470" y="600" width="220" height="58" class="action"/>
  <text x="475" y="635" class="text">Solicita processamento</text>

  <rect x="885" y="600" width="220" height="58" class="action"/>
  <text x="925" y="635" class="text">Analisa pagamento</text>

  <polygon points="580,730 650,790 580,850 510,790" class="decision"/>
  <text x="555" y="795" class="text">Pagamento</text>
  <text x="565" y="815" class="text">aprovado?</text>

  <rect x="430" y="880" width="180" height="58" class="action"/>
  <text x="455" y="915" class="text">Confirma pedido</text>

  <rect x="640" y="880" width="180" height="58" class="action"/>
  <text x="665" y="915" class="text">Informa falha</text>

  <path d="M200 178 L200 200" class="flow"/>
  <path d="M290 229 L470 229" class="flow"/>
  <path d="M200 258 L200 300" class="flow"/>
  <path d="M290 329 L470 329" class="flow"/>
  <path d="M200 358 L200 400" class="flow"/>
  <path d="M290 429 L470 429" class="flow"/>
  <path d="M580 458 L580 500" class="flow"/>
  <path d="M200 458 L200 600" class="flow"/>
  <path d="M290 629 L470 629" class="flow"/>
  <path d="M690 629 L885 629" class="flow"/>
  <path d="M995 658 L995 790 L650 790" class="flow"/>
  <path d="M580 558 L580 730" class="flow"/>
  <path d="M580 850 L580 880" class="flow"/>
  <path d="M650 790 L730 790 L730 880" class="flow"/>

  <text x="605" y="870" class="small">sim</text>
  <text x="705" y="775" class="small">não</text>

  <rect x="910" y="710" width="190" height="66" class="note"/>
  <text x="935" y="740" class="small">A comunicação com o serviço</text>
  <text x="927" y="760" class="small">de pagamento é centralizada</text>
  <text x="970" y="780" class="small">via Singleton.</text>
</svg>
